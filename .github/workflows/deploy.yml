name: Deploy to Yandex Cloud VM

# Автодеплой: пуш в ветку -> сборка образа -> Yandex Container Registry -> перезапуск на VM.
on:
  push:
    branches: [ main, claude/affectionate-johnson-37hlcy ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/soroka-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        # Логин по authorized-key сервисного аккаунта: username = json_key, password = содержимое ключа.
        run: |
          echo '${{ secrets.YC_SA_KEY }}' | docker login --username json_key --password-stdin cr.yandex

      - name: Build image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy on VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: IMAGE
          script: |
            set -e
            # VM авторизуется в registry через привязанный сервисный аккаунт (configure-docker).
            docker pull "$IMAGE:latest"
            docker stop soroka-bot || true
            docker rm soroka-bot || true
            docker run -d \
              --name soroka-bot \
              --restart unless-stopped \
              --env-file /opt/soroka_bot/.env \
              "$IMAGE:latest"
            docker image prune -f
