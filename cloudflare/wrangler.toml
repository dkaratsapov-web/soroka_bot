# Конфиг для деплоя через Wrangler CLI (необязательно — можно деплоить через панель).
#
#   npm i -g wrangler
#   wrangler login
#   wrangler secret put BOT_TOKEN        # вставить токен
#   wrangler secret put WEBHOOK_SECRET   # любую длинную строку
#   wrangler deploy
#
# Затем открыть https://<worker>.workers.dev/setup один раз.

name = "leadmagnet-bot"
main = "worker.js"
compatibility_date = "2024-11-01"

# Несекретные переменные (секреты — BOT_TOKEN, WEBHOOK_SECRET — задаются через wrangler secret put):
[vars]
CHANNEL = "@sorokavmarketinge"
CHANNEL_URL = "https://t.me/sorokavmarketinge"
LEAD_MAGNET_TEXT = "Спасибо за подписку! 🎉 Вот твой эксклюзивный документ: clck.ru/3UJyuy — открывай и скачивай. Приятного изучения!"
