# Конфиг Cloudflare Workers.
# Имя воркера -> часть публичного URL: marketing-guide-bot.<ваш-сабдомен>.workers.dev
name = "marketing-guide-bot"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Папка со статикой: welcome.jpg отдаётся по адресу https://<воркер>/welcome.jpg
[assets]
directory = "./public"

# Секреты BOT_TOKEN и WEBHOOK_SECRET задаются НЕ здесь, а как Worker Secrets
# (через GitHub Actions при деплое или вручную: npx wrangler secret put BOT_TOKEN).
