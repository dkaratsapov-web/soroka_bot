# Конфиг Cloudflare Worker (в корне репозитория — чтобы Cloudflare нашёл его при
# авто-деплое из GitHub). Сам код воркера лежит в cloudflare/worker.js.
#
# Несекретные переменные — ниже в [vars]. Секреты (BOT_TOKEN, WEBHOOK_SECRET)
# задаются в панели Cloudflare: Worker → Settings → Variables and Secrets → тип Secret.
# Секреты в git НЕ коммитим.

name = "soroka-bot"
main = "cloudflare/worker.js"
compatibility_date = "2024-11-01"

[vars]
CHANNEL = "@sorokavmarketinge"
CHANNEL_URL = "https://t.me/sorokavmarketinge"
LEAD_MAGNET_TEXT = "Спасибо за подписку!\nДержи гайд «10 проверенных маркетинговых стратегий» — изучай, внедряй и повышай продажи!🔥"
LEAD_MAGNET_FILE_URL = "https://raw.githubusercontent.com/dkaratsapov-web/soroka_bot/main/max/marketing-guide-2026.pdf"
WELCOME_TEXT = "Привет! 👋\n\nДля получения гайда \"10 проверенных маркетинговых стратегий\" подпишись на канал \"Сорокин в Маркетинге\""
